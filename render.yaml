services:
  - type: web
    name: instagram-news-renderer
    runtime: docker
    repo: REPLACE_WITH_GITHUB_REPO
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: instagram-news-state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: INSTAGRAM_GRAPH_BASE_URL
        value: https://graph.instagram.com/v25.0
      - key: CLOUDINARY_FOLDER
        value: instagram_cardnews
      - key: STATE_DIR
        value: /var/data/instagram-news-state
      - key: AUTOMATION_TRIGGER_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
